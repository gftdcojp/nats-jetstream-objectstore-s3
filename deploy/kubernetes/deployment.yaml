apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-objstore-s3
  namespace: spinkube
  labels:
    app: nats-objstore-s3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats-objstore-s3
  template:
    metadata:
      labels:
        app: nats-objstore-s3
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: objstore-s3
          image: ghcr.io/gftdcojp/nats-jetstream-objectstore-s3:0.1.0
          args: ["-config", "/etc/nos3/config.yaml"]
          ports:
            - name: s3
              containerPort: 9000
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/nos3
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: nats-objstore-s3-config
---
apiVersion: v1
kind: Service
metadata:
  name: nats-objstore-s3
  namespace: spinkube
  labels:
    app: nats-objstore-s3
spec:
  type: ClusterIP
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: health
      port: 8081
      targetPort: health
    - name: metrics
      port: 9090
      targetPort: metrics
  selector:
    app: nats-objstore-s3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-objstore-s3-config
  namespace: spinkube
data:
  config.yaml: |
    nats:
      url: "nats://nats.wasmcloud-system:4222"
      max_reconnects: -1
    s3:
      listen: ":9000"
      region: "us-east-1"
      host_style: "path"
    auth:
      enabled: true
      access_key_id: "nats-s3-admin"
      secret_access_key: "changeme"
    buckets:
      auto_create: true
      default_chunk: 131072
    observability:
      metrics:
        enabled: true
        listen: ":9090"
      health:
        enabled: true
        listen: ":8081"
      logging:
        level: "info"
        format: "json"
